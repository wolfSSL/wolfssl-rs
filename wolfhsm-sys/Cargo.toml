[package]
name = "wolfhsm-sys"
version = "0.1.0"
edition = "2021"
description = "Auto-generated Rust FFI bindings to wolfHSM"
license = "GPL-3.0-only OR LicenseRef-wolfSSL-commercial"
repository = "https://github.com/wolfSSL/wolfssl-rs"
links = "wolfhsm"

[dependencies]
wolfcrypt-sys = { version = "0.1.2", path = "../wolfcrypt-sys" }
# wolfhsm-src must be a direct [dependency] (not build-dep) so that Cargo
# propagates DEP_WOLFHSM_SRC_* metadata to our build script.  The crate's
# lib.rs is empty; the cost is negligible.
wolfhsm-src = { version = "0.1.0", path = "../wolfhsm-src" }

[build-dependencies]
bindgen = { workspace = true }
cc = { workspace = true }
