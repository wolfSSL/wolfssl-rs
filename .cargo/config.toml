[alias]
test-caliptra          = "test -p wolfcrypt-dpe-hw --features caliptra-2x,testing-hooks"
test-caliptra-mldsa    = "test -p wolfcrypt-dpe-hw --features caliptra-2x,mldsa87-hw,testing-hooks"
conformance-caliptra   = "run -p wolfcrypt-conformance --bin caliptra_hw_conformance --features wolfcrypt-conformance/caliptra-hw"
# Build the minimal CryptoCb-only wolfSSL for the Caliptra riscv32 firmware target.
# Activate on wolfcrypt-dpe (not wolfcrypt-dpe-hw) because wolfcrypt-dpe owns
# the wolfssl-src chain.  Excludes sp_int.c / sp_c32.c / sp_c64.c / wolfmath.c;
# only the CryptoCb dispatch infrastructure is compiled in.
build-caliptra-fw      = "build -p wolfcrypt-dpe --features cryptocb-only --target riscv32imc-unknown-none-elf"
# Build wolfcrypt-dpe-hw with the absolute-minimum wolfSSL (CryptoCb routing
# only, no OPENSSL_EXTRA / HKDF / ASN).  wolfcrypt-dpe-hw is the only crate
# in the build; wolfcrypt-sys is compiled with cryptocb-pure.
build-caliptra-hw-pure = "build -p wolfcrypt-dpe-hw --features caliptra-2x,cryptocb-pure"

[target.riscv32imc-unknown-none-elf]
rustflags = ["-C", "link-arg=-Tmemory.x", "-C", "link-arg=-Tlink.x"]

[env]
# Use the local wolfssl build that has HAVE_DILITHIUM and WOLF_CRYPTO_CB enabled.
# Built from ~/wolfssl with -DWOLFSSL_CRYPTOCB=yes -DWOLFSSL_DILITHIUM=yes.
# Overrides the system pkg-config installation at /usr/local (which lacks these flags).
WOLFSSL_DIR = "/home/mark/WORK/wolfssl-rs/wolfssl-install"
# wolfSSL source tree for the vendored build (cryptocb-only / riscv-bare-metal features).
# When those features are active, wolfcrypt-sys bypasses WOLFSSL_DIR and compiles
# wolfSSL from source via wolfssl-src using this path.
WOLFSSL_SRC = "/home/mark/WORK/wolfssl-rs/wolfssl-src/wolfssl"
# riscv32 C cross-compiler via zig cc.
# Used by the cc crate when compiling wolfssl-src for the riscv32imc-unknown-none-elf target.
CC_riscv32imc_unknown_none_elf = { value = ".cargo/riscv32-cc", relative = true }

[target.x86_64-unknown-linux-gnu]
# Embed RPATH (DT_RPATH, not DT_RUNPATH) so the runtime linker loads the new wolfssl
# (libwolfssl.so.44.1.0) from ~/wolfssl-install instead of the older libwolfssl.so.44.0.1
# at /usr/local/lib.  Both have SONAME libwolfssl.so.44; without the rpath the ldconfig
# cache entry for /usr/local/lib wins.
# --disable-new-dtags is required: modern binutils defaults to DT_RUNPATH which loses
# to the ldconfig cache, while DT_RPATH takes priority before everything.
rustflags = ["-C", "link-arg=-Wl,--disable-new-dtags,-rpath,/home/mark/WORK/wolfssl-rs/wolfssl-install/lib"]
