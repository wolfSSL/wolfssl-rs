[package]
name = "wolfcrypt-sys"
authors = ["WolfSSL Inc"]
version = "0.1.4"
edition = "2024"
description = "Auto-generated Rust FFI bindings to wolfSSL via bindgen"
license = "GPL-3.0-only OR LicenseRef-wolfSSL-commercial"
homepage = "http://wolfssl.com"
repository = "https://github.com/wolfSSL/wolfssl-rs"
readme = "README.md"
keywords = ["wolfcrypt", "wolfssl", "fips", "ffi", "cryptography"]
categories = ["cryptography"]
links = "wolfcrypt_sys"

[features]
default = []
fips = []
vendored = []
riscv-bare-metal = ["vendored", "wolfssl-src/riscv-bare-metal"]
cryptocb-only = ["vendored", "wolfssl-src/cryptocb-only"]
cryptocb-pure = ["vendored", "wolfssl-src/cryptocb-pure"]

[build-dependencies]
bindgen = "0.72.0"
pkg-config = "0.3"
wolfssl-src = { version = "0.1.3", path = "../wolfssl-src" }
